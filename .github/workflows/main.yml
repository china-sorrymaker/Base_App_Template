name: Million-App-Base-AutoBuilder
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 关键：即便仓库里没 gradlew，这一步也能自动安装并配置 Gradle 运行环境
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK & AAB
        # 核心改动：直接调用系统 gradle，不再依赖仓库里的 ./gradlew 脚本
        run: gradle assembleRelease bundleRelease
        env:
          KEY_STORE_PASSWORD: admin123
          KEY_PASSWORD: admin123
          ALIAS: my-key-alias

      - name: Upload Finished Files
        uses: actions/upload-artifact@v4
        with:
          name: App-Ready-Files
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
