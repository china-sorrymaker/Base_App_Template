apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'com.boss.unitsmaster'
    compileSdk 35

    defaultConfig {
        applicationId "com.boss.unitsmaster.tile"
        minSdk 24
        targetSdk 35
        // 建议：如果你之前上传失败过，可以把这里改成 2
        versionCode 2 
        versionName "1.1"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // --- 新增：签名配置 ---
    signingConfigs {
        release {
            // 指向刚才在 main.yml 里定义的那个临时文件
            storeFile file("release-key.jks")
            // 从 GitHub Secrets 获取你存的那三个“暗号”
            storePassword System.getenv("KEY_STORE_PASSWORD") ?: "admin123"
            keyAlias System.getenv("ALIAS") ?: "my-key-alias"
            keyPassword System.getenv("KEY_PASSWORD") ?: "admin123"
        }
    }

    buildTypes {
        release {
            // --- 核心：这一行让 release 版带上签名 ---
            signingConfig signingConfigs.release
            
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.8.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.android.gms:play-services-ads:23.0.0'
}
